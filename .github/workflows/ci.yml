name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore CrmLstg.sln

      - name: Build
        run: dotnet build CrmLstg.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CrmLstg.sln --configuration Release --no-build --verbosity normal
